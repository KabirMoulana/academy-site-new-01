<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Payments — EduCore</title><link rel="stylesheet" href="../css/style.css"/></head>
<body>
<div class="app-shell" id="appShell"><div class="main-content"><div id="topbarMount"></div><div class="page-body">
  <div class="section-header">
    <div class="section-title">Payments</div>
    <button class="btn btn-primary" onclick="openModal('payModal')">+ Record Payment</button>
  </div>
  <div class="table-wrapper">
    <table><thead><tr><th>ID</th><th>Student</th><th>Amount</th><th>Month</th><th>Paid At</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="payTbody"><tr><td colspan="7" style="text-align:center;padding:28px;color:var(--grey);">Loading…</td></tr></tbody></table>
  </div>
</div></div></div>

<div class="modal-overlay" id="payModal">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">Record Payment</h2><button class="modal-close" onclick="closeModal('payModal')">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Student ID</label><input class="form-control" id="pStudentID" type="number" placeholder="1"/></div>
      <div class="form-group"><label class="form-label">Amount (Rs)</label><input class="form-control" id="pAmount" type="number" placeholder="8500"/></div>
      <div class="form-group"><label class="form-label">Month</label><input class="form-control" id="pMonth" type="month"/></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-control" id="pStatus"><option value="pending">Pending</option><option value="approved">Approved</option></select></div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="recordPayment()">Record</button>
      <button class="btn btn-outline" onclick="closeModal('payModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script><script src="../js/layout.js"></script><script src="../js/api.js"></script>
<script>
async function loadPayments(){
  const rows=await API.listPayments();
  renderTable('payTbody',rows,[
    r=>`#${r.paymentID}`, r=>r.studentName||`Student #${r.studentID}`,
    r=>`Rs ${parseFloat(r.amount).toLocaleString()}`,
    r=>r.month?.slice(0,7)||'—', r=>r.paidAt?.split('T')[0]||'—',
    r=>badge(r.status),
    r=>`${r.status==='pending'?`<button class="btn btn-success btn-sm" onclick="approve(${r.paymentID})">Approve</button> `:''}
        <button class="btn btn-danger btn-sm" onclick="delPay(${r.paymentID})">Delete</button>`
  ]);
}
async function recordPayment(){
  const d={studentID:parseInt(document.getElementById('pStudentID').value),
    amount:parseFloat(document.getElementById('pAmount').value),
    month:document.getElementById('pMonth').value+'-01',
    status:document.getElementById('pStatus').value};
  if(!d.studentID||!d.amount||!document.getElementById('pMonth').value){showToast('All fields required','error');return;}
  await API.recordPayment(d); showToast('Payment recorded!'); closeModal('payModal'); loadPayments();
}
async function approve(id){await API.approvePayment(id);showToast('Approved!');loadPayments();}
async function delPay(id){confirmDelete('this payment',async()=>{await API.deletePayment(id);showToast('Deleted');loadPayments();});}
buildLayout([{label:'Finance',items:[{icon:'💳',name:'Payments',active:true},{icon:'🧾',name:'Receipts',href:'receipts.html'}]},{label:'Back',items:[{icon:'📊',name:'Dashboard',href:'admin-dashboard.html'}]}],'Payments');
authGuard().then(loadPayments);
</script>
</body></html>
