<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Batches — EduCore</title><link rel="stylesheet" href="../css/style.css"/></head>
<body>
<div class="app-shell" id="appShell"><div class="main-content"><div id="topbarMount"></div><div class="page-body">
  <div class="section-header">
    <div class="section-title">Batches</div>
    <button class="btn btn-primary" onclick="openModal('batchModal')">+ Create Batch</button>
  </div>
  <div class="table-wrapper">
    <table><thead><tr><th>ID</th><th>Name</th><th>Mode</th><th>Schedule</th><th>Start</th><th>End</th><th>Actions</th></tr></thead>
    <tbody id="batchesTbody"><tr><td colspan="7" style="text-align:center;padding:28px;color:var(--grey);">Loading…</td></tr></tbody></table>
  </div>
</div></div></div>

<div class="modal-overlay" id="batchModal">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title" id="batchModalTitle">Create Batch</h2><button class="modal-close" onclick="closeModal('batchModal')">✕</button></div>
    <div class="form-grid">
      <input type="hidden" id="editBatchID"/>
      <div class="form-group"><label class="form-label">Batch Name</label><input class="form-control" id="bName" placeholder="Batch D – 2025"/></div>
      <div class="form-group"><label class="form-label">Mode</label><select class="form-control" id="bMode"><option value="online">Online</option><option value="physical">Physical</option></select></div>
      <div class="form-group"><label class="form-label">Schedule</label><input class="form-control" id="bSched" placeholder="Mon/Wed 6PM"/></div>
      <div class="form-group"><label class="form-label">Start Date</label><input class="form-control" type="date" id="bStart"/></div>
      <div class="form-group"><label class="form-label">End Date</label><input class="form-control" type="date" id="bEnd"/></div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="saveBatch()">Save</button>
      <button class="btn btn-outline" onclick="closeModal('batchModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script><script src="../js/layout.js"></script><script src="../js/api.js"></script>
<script>
async function loadBatches(){
  const rows=await API.listBatches();
  renderTable('batchesTbody',rows,[
    r=>`#${r.batchID}`,r=>r.batchName,r=>badge(r.mode),r=>r.schedule||'—',
    r=>r.batchStartDate||'—',r=>r.batchEndDate||'—',
    r=>`<button class="btn btn-outline btn-sm" onclick="editBatch(${r.batchID},'${r.batchName}','${r.mode}','${r.schedule||''}','${r.batchStartDate||''}','${r.batchEndDate||''}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="delBatch(${r.batchID},'${r.batchName}')">Delete</button>`
  ]);
}
function editBatch(id,name,mode,sched,start,end){
  document.getElementById('editBatchID').value=id;
  document.getElementById('bName').value=name;
  document.getElementById('bMode').value=mode;
  document.getElementById('bSched').value=sched;
  document.getElementById('bStart').value=start;
  document.getElementById('bEnd').value=end;
  document.getElementById('batchModalTitle').textContent='Edit Batch';
  openModal('batchModal');
}
async function saveBatch(){
  const id=document.getElementById('editBatchID').value;
  const d={batchName:document.getElementById('bName').value,mode:document.getElementById('bMode').value,
    schedule:document.getElementById('bSched').value,batchStartDate:document.getElementById('bStart').value,
    batchEndDate:document.getElementById('bEnd').value};
  if(!d.batchName){showToast('Name required','error');return;}
  if(id) await API.updateBatch(id,d); else await API.createBatch(d);
  showToast('Saved!'); document.getElementById('editBatchID').value='';
  closeModal('batchModal'); loadBatches();
}
async function delBatch(id,name){confirmDelete(name,async()=>{await API.deleteBatch(id);showToast('Deleted');loadBatches();});}
buildLayout([{label:'Academic',items:[{icon:'📚',name:'Subjects',href:'subjects.html'},{icon:'🗓️',name:'Batches',active:true}]},{label:'Profile',items:[{icon:'👤',name:'Dashboard',href:'admin-dashboard.html'}]}],'Batches');
authGuard().then(loadBatches);
</script>
</body></html>
