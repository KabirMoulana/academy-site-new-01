<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — EduCore</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-shell" id="appShell">
  <div class="main-content">
    <div id="topbarMount"></div>
    <div class="page-body">

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">👨‍🎓</span><div class="stat-value" id="statStudents">…</div><div class="stat-label">Total Students</div></div>
        <div class="stat-card"><span class="stat-icon">🎓</span><div class="stat-value" id="statLecturers">…</div><div class="stat-label">Lecturers</div></div>
        <div class="stat-card"><span class="stat-icon">📚</span><div class="stat-value" id="statSubjects">…</div><div class="stat-label">Subjects</div></div>
        <div class="stat-card"><span class="stat-icon">🗓️</span><div class="stat-value" id="statBatches">…</div><div class="stat-label">Active Batches</div></div>
      </div>

      <div class="tab-section">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tab-users">Users</button>
          <button class="tab-btn" data-tab="tab-announcements">Announcements</button>
          <button class="tab-btn" data-tab="tab-notifs">Notifications</button>
        </div>

        <!-- USERS -->
        <div class="tab-content active" id="tab-users">
          <div class="section-header">
            <div class="section-title">All Users</div>
            <div style="display:flex;gap:10px;align-items:center;">
              <select class="form-control" id="roleFilter" style="width:160px;" onchange="loadUsers()">
                <option value="">All Roles</option>
                <option value="admin">Admin</option>
                <option value="manager">Manager</option>
                <option value="director">Director</option>
                <option value="lecturer">Lecturer</option>
                <option value="student">Student</option>
                <option value="parent">Parent</option>
                <option value="receptionist">Receptionist</option>
              </select>
              <div class="search-bar"><span>🔍</span><input type="text" id="userSearch" placeholder="Search…" oninput="filterTable('userSearch','userTable')"/></div>
              <button class="btn btn-primary" onclick="openModal('addUserModal')">+ Add User</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table id="userTable">
              <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
              <tbody id="usersTbody"><tr><td colspan="7" style="text-align:center;padding:28px;color:var(--grey);">Loading…</td></tr></tbody>
            </table>
          </div>
        </div>

        <!-- ANNOUNCEMENTS -->
        <div class="tab-content" id="tab-announcements">
          <div class="section-header">
            <div class="section-title">Announcements</div>
            <button class="btn btn-primary" onclick="openModal('addAnnModal')">+ Post</button>
          </div>
          <div id="annList"><div style="color:var(--grey);padding:20px;">Loading…</div></div>
        </div>

        <!-- NOTIFICATIONS -->
        <div class="tab-content" id="tab-notifs">
          <div class="section-header">
            <div class="section-title">Send Notification</div>
          </div>
          <div class="card">
            <div class="form-grid">
              <div class="form-group"><label class="form-label">User ID</label><input class="form-control" id="notifUserID" placeholder="User ID…"/></div>
              <div class="form-group"><label class="form-label">Type</label><select class="form-control" id="notifType"><option>General</option><option>Payment</option><option>Attendance</option><option>Exam</option></select></div>
              <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Message</label><textarea class="form-control" id="notifMsg" rows="3" style="resize:vertical;"></textarea></div>
            </div>
            <div class="form-actions" style="margin-top:16px;">
              <button class="btn btn-primary" onclick="sendNotif()">Send Notification</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal-overlay" id="addUserModal">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">Add New User</h2><button class="modal-close" onclick="closeModal('addUserModal')">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="newName" placeholder="Full name"/></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="newEmail" type="email" placeholder="email@educore.lk"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-control" id="newPass" type="password" placeholder="••••••••"/></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-control" id="newRole">
          <option value="admin">Admin</option><option value="manager">Manager</option>
          <option value="director">Director</option><option value="lecturer">Lecturer</option>
          <option value="student">Student</option><option value="parent">Parent</option>
          <option value="receptionist">Receptionist</option>
        </select>
      </div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="createUser()">Create User</button>
      <button class="btn btn-outline" onclick="closeModal('addUserModal')">Cancel</button>
    </div>
  </div>
</div>

<!-- ANNOUNCEMENT MODAL -->
<div class="modal-overlay" id="addAnnModal">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">Post Announcement</h2><button class="modal-close" onclick="closeModal('addAnnModal')">✕</button></div>
    <div class="form-grid" style="grid-template-columns:1fr;">
      <div class="form-group"><label class="form-label">Title</label><input class="form-control" id="annTitle" placeholder="Title…"/></div>
      <div class="form-group"><label class="form-label">Content</label><textarea class="form-control" id="annContent" rows="4" style="resize:vertical;"></textarea></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-control" id="annStatus"><option value="Published">Published</option><option value="Draft">Draft</option></select></div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="postAnn()">Post</button>
      <button class="btn btn-outline" onclick="closeModal('addAnnModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/api.js"></script>
<script>
async function loadStats() {
  const [students, lecturers, subjects, batches] = await Promise.all([
    API.listUsers('student'), API.listUsers('lecturer'),
    API.listSubjects(), API.listBatches()
  ]);
  document.getElementById('statStudents').textContent  = students.length;
  document.getElementById('statLecturers').textContent = lecturers.length;
  document.getElementById('statSubjects').textContent  = subjects.length;
  document.getElementById('statBatches').textContent   = batches.length;
}

async function loadUsers() {
  const role  = document.getElementById('roleFilter').value;
  const users = await API.listUsers(role);
  renderTable('usersTbody', users, [
    r => `#${r.userID}`,
    r => r.name,
    r => r.email,
    r => badge(r.role),
    r => badge(r.isActive ? 'Active' : 'Inactive', r.isActive ? 'active' : 'inactive'),
    r => r.createdAt?.split('T')[0] || r.createdAt || '—',
    r => `<button class="btn btn-danger btn-sm" onclick="deleteUser(${r.userID},'${r.name}')">Delete</button>`
  ]);
}

async function createUser() {
  const name  = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const pass  = document.getElementById('newPass').value.trim();
  const role  = document.getElementById('newRole').value;
  if (!name||!email||!pass) { showToast('All fields required','error'); return; }
  await API.createUser({name,email,password:pass,role});
  showToast('User created!');
  closeModal('addUserModal');
  loadUsers(); loadStats();
}

async function deleteUser(id, name) {
  confirmDelete(name, async () => {
    await API.deleteUser(id);
    showToast(`${name} deleted`);
    loadUsers(); loadStats();
  });
}

async function loadAnnouncements() {
  const anns = await API.listAnnouncements();
  const el = document.getElementById('annList');
  if (!anns.length) { el.innerHTML = '<p style="color:var(--grey);">No announcements.</p>'; return; }
  el.innerHTML = anns.map(a => `
    <div class="announcement-card">
      <div style="display:flex;justify-content:space-between;align-items:start;">
        <div class="ann-title">${a.title}</div>
        <button class="btn btn-danger btn-sm" onclick="deleteAnn(${a.announcementID})">Delete</button>
      </div>
      <p class="ann-content">${a.content||''}</p>
      <div class="ann-meta"><span>📅 ${(a.postedAt||'').split('T')[0]}</span>${badge(a.announcementStatus)}<span>by ${a.postedBy||''}</span></div>
    </div>`).join('');
}

async function postAnn() {
  const title   = document.getElementById('annTitle').value.trim();
  const content = document.getElementById('annContent').value.trim();
  const status  = document.getElementById('annStatus').value;
  if (!title) { showToast('Title required','error'); return; }
  await API.postAnnouncement({title,content,announcementStatus:status});
  showToast('Announcement posted!');
  closeModal('addAnnModal');
  loadAnnouncements();
}

async function deleteAnn(id) {
  confirmDelete('this announcement', async () => {
    await API.deleteAnnouncement(id);
    showToast('Deleted');
    loadAnnouncements();
  });
}

async function sendNotif() {
  const userID  = parseInt(document.getElementById('notifUserID').value);
  const message = document.getElementById('notifMsg').value.trim();
  const type    = document.getElementById('notifType').value;
  if (!userID||!message) { showToast('User ID and message required','error'); return; }
  await API.listNotifications(); // just to check session
  await api('notifications','send','POST',{userID,message,notificationType:type});
  showToast('Notification sent!');
  document.getElementById('notifMsg').value = '';
}

buildLayout([
  { label:'Overview', items:[
    {icon:'📊',name:'Dashboard',active:true},
    {icon:'📢',name:'Announcements',href:'#'},
  ]},
  { label:'Management', items:[
    {icon:'👥',name:'Users',href:'#'},
    {icon:'📚',name:'Subjects',href:'subjects.html'},
    {icon:'🗓️',name:'Batches',href:'batches.html'},
    {icon:'📋',name:'Enrollments',href:'enrollments.html'},
    {icon:'🎥',name:'Sessions',href:'sessions.html'},
    {icon:'✅',name:'Attendance',href:'attendance.html'},
    {icon:'📝',name:'Results',href:'results.html'},
    {icon:'💳',name:'Payments',href:'payments.html'},
    {icon:'🧾',name:'Receipts',href:'receipts.html'},
    {icon:'🏆',name:'Leaderboard',href:'leaderboard.html'},
  ]},
  { label:'Profile', items:[{icon:'👤',name:'My Profile',href:'profile.html'}]},
], 'Admin Dashboard');

authGuard().then(() => { loadStats(); loadUsers(); loadAnnouncements(); });
</script>
</body>
</html>
