<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Receipts — EduCore</title><link rel="stylesheet" href="../css/style.css"/></head>
<body>
<div class="app-shell" id="appShell"><div class="main-content"><div id="topbarMount"></div><div class="page-body">
  <div class="section-header">
    <div class="section-title">Receipts</div>
    <button class="btn btn-primary" onclick="openModal('recModal')">+ Generate Receipt</button>
  </div>
  <div class="table-wrapper">
    <table><thead><tr><th>ID</th><th>Student</th><th>Amount</th><th>Issue Date</th><th>Note</th><th>Actions</th></tr></thead>
    <tbody id="recTbody"><tr><td colspan="6" style="text-align:center;padding:28px;color:var(--grey);">Loading…</td></tr></tbody></table>
  </div>
</div></div></div>

<div class="modal-overlay" id="recModal">
  <div class="modal">
    <div class="modal-header"><h2 class="modal-title">Generate Receipt</h2><button class="modal-close" onclick="closeModal('recModal')">✕</button></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Payment ID</label><input class="form-control" id="rPayID" type="number" placeholder="1"/></div>
      <div class="form-group"><label class="form-label">Amount (Rs)</label><input class="form-control" id="rAmount" type="number" placeholder="8500"/></div>
      <div class="form-group"><label class="form-label">Note</label><input class="form-control" id="rNote" placeholder="June payment…"/></div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="genReceipt()">Generate</button>
      <button class="btn btn-outline" onclick="closeModal('recModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script><script src="../js/layout.js"></script><script src="../js/api.js"></script>
<script>
async function loadReceipts(){
  const rows=await API.listReceipts();
  renderTable('recTbody',rows,[
    r=>`#${r.receiptID}`, r=>r.studentName||'—',
    r=>`Rs ${parseFloat(r.receiptAmount).toLocaleString()}`,
    r=>r.issueDate||'—', r=>r.receiptNote||'—',
    r=>`<button class="btn btn-success btn-sm" onclick="showToast('Printing receipt…','gold')">Print</button>
        <button class="btn btn-danger btn-sm" onclick="delRec(${r.receiptID})">Delete</button>`
  ]);
}
async function genReceipt(){
  const d={paymentID:parseInt(document.getElementById('rPayID').value),
    receiptAmount:parseFloat(document.getElementById('rAmount').value),
    receiptNote:document.getElementById('rNote').value};
  if(!d.paymentID||!d.receiptAmount){showToast('Payment ID and amount required','error');return;}
  await API.genReceipt(d); showToast('Receipt generated!'); closeModal('recModal'); loadReceipts();
}
async function delRec(id){confirmDelete('this receipt',async()=>{await API.deleteReceipt(id);showToast('Deleted');loadReceipts();});}
buildLayout([{label:'Finance',items:[{icon:'💳',name:'Payments',href:'payments.html'},{icon:'🧾',name:'Receipts',active:true}]},{label:'Back',items:[{icon:'📊',name:'Dashboard',href:'admin-dashboard.html'}]}],'Receipts');
authGuard().then(loadReceipts);
</script>
</body></html>
