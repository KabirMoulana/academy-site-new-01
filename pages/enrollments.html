<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enrollments — EduCore</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-shell" id="appShell">
  <div class="main-content">
    <div id="topbarMount"></div>
    <div class="page-body">

      <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">✅</span><div class="stat-value" id="statActive">…</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><span class="stat-icon">❌</span><div class="stat-value" id="statInactive">…</div><div class="stat-label">Inactive</div></div>
        <div class="stat-card"><span class="stat-icon">📊</span><div class="stat-value" id="statTotal">…</div><div class="stat-label">Total</div></div>
      </div>

      <div class="section-header">
        <div class="section-title">Enrollments</div>
        <div style="display:flex;gap:10px;align-items:center;">
          <select class="form-control" id="statusFilter" style="width:140px;" onchange="loadEnrollments()">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="enrollSearch" placeholder="Search…" oninput="filterTable('enrollSearch','enrollTable')"/>
          </div>
          <button class="btn btn-primary" onclick="openModal('enrollModal')">+ Enroll Student</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="enrollTable">
          <thead>
            <tr><th>ID</th><th>Student</th><th>Batch</th><th>Enroll Date</th><th>Unenroll Date</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="enrollTbody">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--grey);">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<!-- ENROLL MODAL -->
<div class="modal-overlay" id="enrollModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Enroll Student</h2>
      <button class="modal-close" onclick="closeModal('enrollModal')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Student ID</label>
        <input class="form-control" id="enStudentID" type="number" placeholder="e.g. 1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Batch</label>
        <select class="form-control" id="enBatch"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Enroll Date</label>
        <input class="form-control" id="enDate" type="date"/>
      </div>
    </div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="doEnroll()">Enroll</button>
      <button class="btn btn-outline" onclick="closeModal('enrollModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/api.js"></script>
<script>
let allEnrollments = [];

async function loadEnrollments() {
  allEnrollments = await API.listEnrollments();
  const filter = document.getElementById('statusFilter').value;
  const rows   = filter ? allEnrollments.filter(e => e.status === filter) : allEnrollments;

  document.getElementById('statActive').textContent   = allEnrollments.filter(e=>e.status==='active').length;
  document.getElementById('statInactive').textContent = allEnrollments.filter(e=>e.status==='inactive').length;
  document.getElementById('statTotal').textContent    = allEnrollments.length;

  renderTable('enrollTbody', rows, [
    r => `#${r.enrollmentID}`,
    r => r.studentName || `Student #${r.studentID}`,
    r => r.batchName   || `Batch #${r.batchID}`,
    r => r.enrollDate  || '—',
    r => r.unenrollDate|| '—',
    r => badge(r.status),
    r => r.status === 'active'
      ? `<button class="btn btn-danger btn-sm" onclick="doUnenroll(${r.enrollmentID},'${r.studentName||r.studentID}')">Unenroll</button>`
      : `<button class="btn btn-success btn-sm" onclick="doReenroll(${r.enrollmentID},'${r.studentName||r.studentID}')">Re-enroll</button>`
  ]);
}

async function loadBatches() {
  const batches = await API.listBatches();
  document.getElementById('enBatch').innerHTML =
    batches.map(b => `<option value="${b.batchID}">${b.batchName}</option>`).join('');
}

async function doEnroll() {
  const studentID = parseInt(document.getElementById('enStudentID').value);
  const batchID   = parseInt(document.getElementById('enBatch').value);
  const enrollDate= document.getElementById('enDate').value || new Date().toISOString().split('T')[0];
  if (!studentID || !batchID) { showToast('Student ID and Batch required', 'error'); return; }
  await API.enroll({ studentID, batchID, enrollDate });
  showToast('Student enrolled!');
  closeModal('enrollModal');
  document.getElementById('enStudentID').value = '';
  loadEnrollments();
}

async function doUnenroll(id, name) {
  confirmDelete(`enrollment for ${name}`, async () => {
    await API.unenroll(id);
    showToast(`${name} unenrolled`);
    loadEnrollments();
  });
}

async function doReenroll(id, name) {
  await API.reenroll(id);
  showToast(`${name} re-enrolled!`);
  loadEnrollments();
}

buildLayout([
  { label:'Management', items:[
    { icon:'📋', name:'Enrollments', active:true },
    { icon:'🗓️', name:'Batches',     href:'batches.html' },
    { icon:'📚', name:'Subjects',    href:'subjects.html' },
  ]},
  { label:'Back', items:[
    { icon:'📊', name:'Dashboard', href:'admin-dashboard.html' },
  ]},
], 'Enrollments');

authGuard().then(() => { loadBatches(); loadEnrollments(); });
</script>
</body>
</html>
